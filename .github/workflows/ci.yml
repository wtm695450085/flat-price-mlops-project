name: CI/CD - Flat Price MLOps Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  basic-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile src/monitoring/drift_report.py

      - name: Check Docker Compose configuration
        run: |
          docker compose config

  deploy-to-vps:
    runs-on: ubuntu-latest
    needs: basic-checks

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Configure SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key

      - name: Deploy project on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/vps_deploy_key \
              -p "${VPS_PORT:-22}" \
              "$VPS_USER@$VPS_HOST" << EOF
            set -e

            cd "$VPS_PROJECT_PATH"

            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Starting Docker Compose..."
            docker compose up -d --build --remove-orphans

            echo "Docker containers:"
            docker compose ps

            echo "Checking FastAPI..."
            curl -f http://127.0.0.1:8000/health

            echo "Checking Prometheus..."
            curl -f http://127.0.0.1:9090/-/healthy

            echo "Checking Grafana..."
            curl -f http://127.0.0.1:3000/api/health

            echo "Deployment finished successfully."
          EOF
